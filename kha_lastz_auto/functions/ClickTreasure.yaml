# Function: ClickTreasure (click lien tuc vao Treasure Helicopter)
# Triggered by treasure_detected. Sends Zalo alert then clicks treasure.
description: "Treasure detected: send Zalo, then click lien tuc vao Treasure Helicopter"
steps:
  # send_zalo: toggle on/off in function settings (gear) via "Send Zalo notification" / send_zalo
  

  - event_type: match_click
    template_array:
      - buttons_template/Treasure1-3.png
    threshold: 0.65
    one_shot: true
    timeout_sec: 10
    debug_log: true
    roi_center_x: 0.74
    roi_center_y: 0.89
    roi_padding: 2


  - event_type: send_zalo
    receiver_name: "Nhóm HLSE"
    message: "@All Có kho báo!"
    repeat_interval_sec: 60
  
  - event_type: sleep
    duration_sec: 3

  - event_type: match_click
    template: buttons_template/Treasure2.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 10
    debug_log: true

  - event_type: sleep
    duration_sec: 3


  - event_type: match_storm_click
    template: buttons_template/Treasure3.png
    threshold: 0.6
    run_always: true
    timeout_sec: 300     # click for up to 300s (step ends normally when time is up)
    offset_change_time: 5
    offset_change_pause_sec: 0.1  # idle after offset rollover before new random pixel (default 0.2)
    storm_click_interval_sec: 0.05  # sleep after each storm click; default 0.1 (~10/s). Or storm_click_max_rate
    check_template_after: 250       # seconds after storm start before first periodic template check
    check_template_frequence: 10    # then re-check every N seconds (storm pauses + template_verify_settle_sec before capture)
    template_verify_settle_sec: 0.25  # optional; wait after stopping clicks so Treasure3 is visible (default 0.25)
    offset_x: 0.03       # ±3%10  of window width (~32px on 1080px window)
    offset_y: 0.03       # ±3% of window height (~58px on 1920px window)
    close_ui_check: true                # mặc định true, tắt thì set false
    close_ui_check_interval_sec: 5.0   # tần suất check close_ui (giây); default 1.0
    debug_log: false                   # true: log best_match_score on periodic / offset-change verify
    close_ui_click_x: 0.03             # vị trí click để dismiss UI (default)
    close_ui_click_y: 0.5
    
    close_ui_back_button: buttons_template/BackButton.png  # optional


    #position_refresh_sec: 1
    # corner:              # every N clicks, send 1 click here to keep window focused
    #   offset_x: 0.05
    #   offset_y: 0.05
    #   every: 20
    #   pause_sec: 0.2     # wait after storm stops before corner click (then resume storm)


  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    roi_center_x: 0.93
    roi_center_y: 0.96
    roi_padding: 2
    threshold: 0.6
    run_always: true
    
  - event_type: base_zoomout
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    roi_center_x: 0.93
    roi_center_y: 0.96
    roi_padding: 2
    threshold: 0.6
    scroll_times: 5
    scroll_interval_sec: 0.1