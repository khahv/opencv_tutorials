# Function: ClickTreasure (click lien tuc vao Treasure Helicopter)
# Triggered by treasure_detected. Sends Zalo alert then clicks treasure.
description: "Treasure detected: send Zalo, then click lien tuc vao Treasure Helicopter"
steps:
  - event_type: send_zalo
    message: "@All Có kho báo!"
    repeat_interval_sec: 60

  - event_type: match_click
    template: buttons_template/Treasure1.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2
    debug_log: true

  - event_type: match_click
    template: buttons_template/Treasure4.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2
    debug_log: true


  - event_type: match_click
    template: buttons_template/Treasure3.png
    threshold: 0.6
    run_always: true
    one_shot: false
    timeout_sec: 60
    max_clicks: 3000
    click_offset_y: 0.1
    cache_position: true
    click_storm_sec: 60         # detect once, storm for entire session (no detection gaps)
    click_storm_offset_x: 30   # ±30px random X offset per click
    click_storm_offset_y: 30   # ±30px random Y offset per click
    click_storm_corner:        # every N clicks, send 1 click to this position
      offset_x: 0.05          # 5% from left edge of game window (same as click_position)
      offset_y: 0.05          # 5% from top edge of game window
      every: 20               # click corner once per 20 normal clicks
    debug_click: false
    debug_log: false

