# Function: ClickTreasure (click lien tuc vao Treasure Helicopter)
# Triggered by treasure_detected. Sends Zalo alert then clicks treasure.
description: "Treasure detected: send Zalo, then click lien tuc vao Treasure Helicopter"
steps:
  - event_type: send_zalo
    receiver_name: "Nhóm HLSE"
    message: "@All Có kho báo!"
    repeat_interval_sec: 60

  - event_type: match_click
    template_array:
      - buttons_template/Treasure1-3.png
    threshold: 0.7
    one_shot: true
    timeout_sec: 10
    debug_log: true
    roi_center_x: 0.74
    roi_center_y: 0.89
    roi_padding: 2

  
  - event_type: sleep
    duration_sec: 2

  - event_type: match_click
    template: buttons_template/Treasure2.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2
    debug_log: true

  - event_type: sleep
    duration_sec: 2


  - event_type: match_storm_click
    template: buttons_template/Treasure3.png
    threshold: 0.6
    run_always: true
    timeout_sec: 5
    storm_sec: 300
    max_clicks: 3000
    offset_x: 30
    offset_y: 30
    offset_change_time: 2
    guard_outside: true  # block user clicks outside game window
    close_ui_check: true           # mặc định true, tắt thì set false
    close_ui_click_x: 0.03        # vị trí click để dismiss UI (default)
    close_ui_click_y: 0.08
    close_ui_back_button: buttons_template/BackButton.png  # optional


