# Function: FightBoomer
description: "Magnifier -> Boomer -> set level (OCR) -> Search -> Team Up -> March"
steps:
  
  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png


  - event_type: match_click
    template: buttons_template/Radar2.png
    threshold: 0.7
    one_shot: true
    timeout_sec: 4

  - event_type: sleep
    duration_sec: 1

  - event_type: match_click
    template: buttons_template/RadarLaura.png
    threshold: 0.7
    one_shot: true
    timeout_sec: 3

  - event_type: sleep
    duration_sec: 1
    run_always: true

  - event_type: match_click
    name: FindRadarItem
    template_array:
      - template: buttons_template/Radar5-1.png
        match_center_x: 0.0
        match_center_y: 0.0
        exclude_area_x: 1.7
        exclude_area_y: 1.6
      - template: buttons_template/Radar5-2.png
        match_center_x: 0.0
        match_center_y: -0.05
        exclude_area_x: 1.7
        exclude_area_y: 2.3
      - template: buttons_template/Radar5-3.png
        match_center_x: 0.0
        match_center_y: -0.05
        exclude_area_x: 1.7
        exclude_area_y: 2.3
    exclude_template: buttons_template/RadarRedDot.png
    exclude_threshold: 0.85

    threshold: 0.88
    one_shot: true
    timeout_sec: 2
    debug_log: true
    log_all_scores: true

    max_tries: 30
    on_max_tries_reach_goto: CloseUI
    dedup_enable: true
    debug_save: true

 # found Radar Zombie, go to previous step (step 5)
  - event_type: match_click
    template: buttons_template/RadarZombie.png
    threshold: 0.85
    one_shot: true
    timeout_sec: 2
    on_success_goto: FindRadarItem

  
  # - event_type: match_click
  #   template: buttons_template/RadarTownIcon.png
  #   threshold: 0.85
  #   match_color: true
  #   one_shot: true
  #   timeout_sec: 2
  #   on_fail_goto: 0

  # check if Radar3 or RadarTownIcon is visible (match only, no click)

  - event_type: match_click
    template_array:
      - buttons_template/Radar3.png
    threshold: 0.8
    one_shot: true
    timeout_sec: 2
    debug_log: true
    run_always: true
    on_success_goto: RadarAttackHelpButton

  - event_type: match_click
    template_array:
      - buttons_template/RadarTownIcon.png
    threshold: 0.8
    one_shot: true
    no_click: true
    timeout_sec: 2
    debug_log: true
    run_always: true
    on_fail_goto: FindRadarItem

 

  - event_type: sleep
    duration_sec: 1
    run_always: true
  

  - event_type: match_click
    name: RadarAttackHelpButton
    template_array:
      - buttons_template/RadarAttack.png
      - buttons_template/RadarHelp.png
    threshold: 0.7
    one_shot: true
    timeout_sec: 5

  - event_type: match_click
    template_array:
      - buttons_template/March.png
      - buttons_template/March1.png
    threshold: 0.7
    one_shot: true
    timeout_sec: 2

  - event_type: close_ui
    name: CloseUI
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    run_always: true