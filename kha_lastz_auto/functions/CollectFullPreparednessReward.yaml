# Function: FightBoomer
description: "Magnifier -> Boomer -> set level (OCR) -> Search -> Team Up -> March"
steps:
  

  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png

  - event_type: base_zoomout
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    roi_center_x: 0.93
    roi_center_y: 0.96
    roi_padding: 2
    threshold: 0.6
    scroll_times: 5
    scroll_interval_sec: 0.1
    
  - event_type: match_click
    template: buttons_template/EventCenter.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2

  - event_type: sleep
    duration_sec: 1

  - event_type: match_click
    template: buttons_template/FullPreparedness.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2
    on_success_goto: SleepBeforeReceiveAward

  # Drag all to the left
  - event_type: drag
    direction_x: 1
    direction_y: 0
    count: 1
    run_always: true
    start_x: 0.25
    start_y: 0.96
    drag_distance_ratio: 1.5

  - event_type: sleep
    duration_sec: 1
  
  - event_type: match_click
    template_array:
      - buttons_template/FullPreparedness.png
      - buttons_template/FullPreparedness2.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2
    on_success_goto: SleepBeforeReceiveAward

  - event_type: sleep
    duration_sec: 1
    name: SleepBeforeReceiveAward
  

  # First reward
  - event_type: click_position
    name: ReceiveAward
    x: 0.24
    y: 0.5

  - event_type: sleep
    duration_sec: 2

  - event_type: click_position
    name: ClickMiddleScreen1
    x: 0.5
    y: 0.01

  - event_type: sleep
    duration_sec: 1

  # second reward
  - event_type: click_position
    name: ReceiveAward
    x: 0.5
    y: 0.5

  - event_type: sleep
    duration_sec: 2 

  - event_type: click_position
    name: ClickMiddleScreen2
    x: 0.5
    y: 0.01

  - event_type: sleep
    duration_sec: 1


  # third reward
  - event_type: click_position
    name: ReceiveAward
    x: 0.76
    y: 0.5
  
  - event_type: sleep
    duration_sec: 3

  - event_type: click_position
    name: ClickMiddleScreen3
    x: 0.5
    y: 0.01

  - event_type: sleep
    duration_sec: 2

  # fourth reward
  - event_type: click_position
    name: ReceiveAward
    x: 0.50
    y: 0.31
  
  - event_type: sleep
    duration_sec: 2
  
  - event_type: click_position
    name: ClickMiddleScreen4
    x: 0.5
    y: 0.01


   # fifth reward
  - event_type: click_position
    name: ReceiveAward
    x: 0.68
    y: 0.31
  
  - event_type: sleep
    duration_sec: 2
  
  - event_type: click_position
    name: ClickMiddleScreen4
    x: 0.5
    y: 0.01

   # sixth reward
  - event_type: click_position
    name: ReceiveAward
    x: 0.84
    y: 0.31
  
  - event_type: sleep
    duration_sec: 2
  
  - event_type: click_position
    name: ClickMiddleScreen4
    x: 0.5
    y: 0.01

  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    roi_center_x: 0.93
    roi_center_y: 0.96
    roi_padding: 2
    threshold: 0.6
    run_always: true

