# Function: FightBoomer
description: "Magnifier -> Boomer -> set level (OCR) -> Search -> Team Up -> March"
steps:

  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    
  - event_type: world_zoomout
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    threshold: 0.75
    scroll_times: 0
    scroll_interval_sec: 0.1
    roi_center_x: 0.93
    roi_center_y: 0.96
    roi_padding: 2

  # Now click MagnifierButton (visible after navigation)
  - event_type: match_click
    template: buttons_template/MagnifierButton.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 10
  - event_type: sleep
    duration_sec: 1
  - event_type: match_click
    template: buttons_template/BoomerButton.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 10
  - event_type: sleep
    duration_sec: 0.5
  # "Lv.X" text sits above the slider bar in the Boomer search dialog.
  # level_ocr_region: screen-ratio coords of the game window (0.0 = top/left, 1.0 = bottom/right).
  # Debug crop is saved to debug_ocr/debug_set_level_roi_raw.png — use it to tune x,y,w,h.
  - event_type: set_level
    target_level: 10
    level_ocr_region:
      x: 0.20   # left edge of "Lv.XX" text
      y: 0.85   # top edge (above the slider bar)
      w: 0.57   # wide enough to capture "Lv.10"
      h: 0.03   # height of one text line
    plus_template: buttons_template/PlusButton.png
    minus_template: buttons_template/MinusButton.png
    threshold: 0.75
    timeout_sec: 20
    debug_save_roi: true
  - event_type: sleep
    duration_sec: 0.5
  - event_type: match_click
    template: buttons_template/SearchButton.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 10
  - event_type: sleep
    duration_sec: 2
  - event_type: match_click
    template: buttons_template/TeamUp.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 10
  - event_type: sleep
    duration_sec: 0.5
  - event_type: match_click
    template: buttons_template/March.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 10
