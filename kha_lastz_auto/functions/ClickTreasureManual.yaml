# Function: ClickTreasure (click lien tuc vao Treasure Helicopter)
description: "Click lien tuc vao Treasure Helicopter khi match"
steps:
  - event_type: match_click
    template: buttons_template/TreasureTest.png
    threshold: 0.6
    run_always: true
    one_shot: false
    timeout_sec: 60
    max_clicks: 500
    click_offset_y: 0.1
    cache_position: true
    click_storm_sec: 60         # detect once, storm for entire session (no detection gaps)
    click_storm_offset_x: 30   # ±30px random X offset per click
    click_storm_offset_y: 30   # ±30px random Y offset per click
    click_storm_corner:        # every N clicks, send 1 click to this position
      offset_x: 0.05          # 5% from left edge of game window (same as click_position)
      offset_y: 0.05          # 5% from top edge of game window
      every: 20               # click corner once per 20 normal clicks
    debug_click: false
    debug_log: false
