# Function: TruckPlunder
description: "Plunder trucks: open panel -> filter -> click truck -> OCR check server+power -> plunder if conditions met"

steps:

  - event_type: match_click
    template: buttons_template/TruckIcon.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 10

  - event_type: match_click
    template: buttons_template/HideTruckFromThisStateUnchecked.png
    threshold: 0.99
    one_shot: true
    timeout_sec: 2

  - event_type: match_click
    template: buttons_template/YellowTruckSmall.png
    threshold: 0.8   # wrong-color truck ~0.924, yellow ~0.95 → 0.93 rejects wrong
    match_color: true
    color_match_tolerance: 50   # YellowTruckSmall BGR vs grey~99 purple~105 — tighten
    color_min_saturation: 140   # YellowTruckSmall S≈199 (yellow) — reject grey S≈30
    color_hue_range: [5, 35]    # YellowTruckSmall H median=17 peak 4-22 — reject purple H≈120
    color_hue_min_fraction: 0.5 # ≥50% saturated pixels in hue_range
    log_match_score: true       # log template_score when match+click
    one_shot: true
    timeout_sec: 10
    run_always: true
    track_tried: true
    debug_click: false
    refresh_template: buttons_template/TruckRefresh.png

  # Wait for game to render the new truck banner after click
  - event_type: sleep
    duration_sec: 0.8
    run_always: true

  # Filter 1 (fast): OrangeHeroFragment must appear exactly 2 times — skip OCR if not found
  # Template match is instant; avoids expensive EasyOCR on irrelevant trucks
  - event_type: match_count
    template: buttons_template/OrangeHeroFragment.png
    count: 2
    threshold: 0.75
    timeout_sec: 1
    run_always: true
    on_fail_goto: 2
    max_retries: 50

  # Filter 2 (slow OCR): check server + power only after OrangeHeroFragment confirmed
  # require_new_click: ensures banner is from the truck just clicked, not the previous one
  # If assertions fail → retry by jumping back to step 2 (click YellowTruck again)
  - event_type: ocr_log
    anchor_template: buttons_template/SPlunderTruckSmallBanner.png
    threshold: 0.70
    timeout_sec: 3
    require_new_click: true
    run_always: true
    debug_save: true
    on_fail_goto: 2   # step index of match_click YellowTruck (0-based)
    max_retries: 50   # total OCR assertion failures before giving up (across refreshes)
    ocr_regions:
      - name: player_name
        x: -2.3   # right of server "#NNN" (which ends at ~-2.45)
        y: 0.0
        w: 2.2    # wide enough to capture [Alliance] PlayerName
        h: 0.40
        digits_only: false

      - name: server
        x: -3.0   # start at "#NNN" text
        y: 0.0
        w: 0.55   # narrow: capture "#NNN" only, cut "L" from "Lv." to avoid misread as "0"
        h: 0.40   # cut before shield icon (bottom ~30%)
        digits_only: false    # keep false: allowlist maps "#" to "4", use pattern to extract
        pattern: "(\\d{3,4})"
        assert_in: ["600", "601"]   # plunder trucks from these servers only

      - name: power
        x: -2.6   # left edge: start after alliance shield icon
        y: 0.45
        w: 1.85   # right margin ~0.25*nw avoids "$" decoration on banner right edge
        h: 0.40   # tighter height: excludes cargo item quantities below power row
        digits_only: true
        pattern: "(\\d{1,3}[,.]\\d{3}[,.]\\d{3})"   # strict: match X,XXX,XXX only — ignores leading/trailing noise
        assert_max: 10000000

  # Reached only if server match AND power < 10,000,000 AND OrangeHeroFragment visible
  - event_type: match_click
    template: buttons_template/TruckLootButton.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 5
