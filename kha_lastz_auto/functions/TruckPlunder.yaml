# Function: TruckPlunder
description: "Plunder trucks: open panel -> filter -> click truck -> OCR check server+power -> plunder if conditions met"

steps:
  
  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    roi_center_x: 0.93
    roi_center_y: 0.96
    roi_padding: 2
    threshold: 0.6
    run_always: true

  - event_type: base_zoomout
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    roi_center_x: 0.93
    roi_center_y: 0.96
    roi_padding: 2
    threshold: 0.6
    scroll_times: 5
    scroll_interval_sec: 0.1
    
  - event_type: match_click
    template: buttons_template/TruckIcon.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 10
    roi_center_x: 0.07
    roi_center_y: 0.65
    roi_padding: 3

  - event_type: sleep
    duration_sec: 2

  - event_type: match_click
    template: buttons_template/HideTruckFromThisStateUnchecked.png
    threshold: 0.7
    roi_center_x: 0.07
    roi_center_y: 0.09
    roi_padding: 2
    one_shot: true
    timeout_sec: 2

  # find_truck: self-contained event that handles the full truck-selection loop.
  #
  # Flow:
  #   1. Detect top max_truck yellow trucks by match score.
  #   2. Click each untried truck (best score first).
  #   3. Check OrangeHeroFragment appears exactly fragment_count times.
  #   4. Run OCR on ocr_regions (server + power assertions).
  #   5. All pass → advance to next step (TruckLootButton).
  #      Any fail → mark truck tried, try next. All tried → refresh → repeat.
  - event_type: find_truck
    run_always: true
    templates:
      - buttons_template/YellowTruckSmall2.png
      - buttons_template/YellowTruckSmall3.png
    threshold: 0.6
    max_truck: 2                  # scan top 5 trucks per refresh cycle
    match_color: true
    # color_match_tolerance: 30   # max mean-BGR distance; tighten to reduce false positives
    dedup_tolerance_x: 0.2       # two matches within 4% screen width → same truck (horizontal check)
    dedup_tolerance_y: 0.05        # ignore vertical distance (trucks can be at different heights)
    sleep_after_click: 0.8        # wait for banner to render after click
    refresh_template: buttons_template/TruckRefresh.png
    refresh_sleep_sec: 1.5        # wait for new truck list after refresh
    max_refreshes: 200
    timeout_sec: 5000
    # debug_log: true
    # debug_save: true

    # Filter 1 – fragment badge check (override via UI Fragment Filters setting)
    fragment_template: buttons_template/TruckPlunderOrangeHeroFragment.png
    fragment_count: 1
    # Templates available in the UI Fragment Filters dropdown.
    # Add entries here — they appear automatically in the settings dialog.
    fragment_template_choices:
      - buttons_template/TruckPlunderOrangeHeroFragment.png
      - buttons_template/TruckPlunderDiamon.png
      - buttons_template/TruckPlunderAlliancePoint.png
      - buttons_template/TruckPlunderDispatchOrder.png
      - buttons_template/TruckPlunderPrimeRecuirtment.png
      - buttons_template/TruckPlunderExteriorModule.png
    fragment_threshold: 0.85
    ocr_on_fragment_fail: true    # always run OCR even if fragment fails (for debug logging)

    # Filter 2 – OCR assertions on server + power
    ocr_anchor_template: buttons_template/SPlunderTruckSmallBanner.png
    ocr_threshold: 0.70
    ocr_timeout_sec: 3
    ocr_regions:
      - name: player_name
        x: -2.3   # right of server "#NNN" (which ends at ~-2.45)
        y: 0.0
        w: 2.2    # wide enough to capture [Alliance] PlayerName
        h: 0.40
        digits_only: false

      - name: server
        x: -2.9   # shifted right vs -3.0 to exclude left flag/icon that OCR misreads as digits
        y: 0.0
        w: 0.55   # narrower to capture "#NNN" only
        h: 0.40   # cut before shield icon (bottom ~30%)
        digits_only: true     # digits-only allowlist → more accurate, "#" stripped automatically
        pattern: "(\\d{3})$"          # last 3 digits → robust against left-side icon noise
        assert_in: ["600", "601"]   # plunder trucks from these servers only

      - name: power
        x: -2.6   # left edge: start after alliance shield icon
        y: 0.45
        w: 1.85   # right margin ~0.25*nw avoids "$" decoration on banner right edge
        h: 0.40   # tighter height: excludes cargo item quantities below power row
        digits_only: true
        pattern: "(\\d{1,3}[,.]\\d{3}([,.]\\d{3})?)"   # match XXX,XXX or X,XXX,XXX
        assert_max: 10000000

  # Reached only when find_truck passes all filters (server OK, power OK, fragment OK)
  - event_type: match_click
    template: buttons_template/TruckLootButton.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 5
