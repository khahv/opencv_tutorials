# Function: DonateAllianceTech
description: "Donate Alliance Tech: Alliance icon -> Techs -> Like -> Donate x20 -> close"

steps:
  # Mo Alliance panel
  - event_type: match_click
    template: buttons_template/AllianceIconButton.png
    threshold: 0.7
    one_shot: true
    timeout_sec: 10
    debug_log: true

  # Vao tab Alliance Techs
  - event_type: match_click
    template: buttons_template/AllianceTechs.png
    threshold: 0.8
    one_shot: true
    timeout_sec: 10

  # Click Like de chon tech can donate
  - event_type: match_click
    template: buttons_template/AllianceTechLike.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 10

  # Donate 20 lan
  - event_type: match_click
    template: buttons_template/AllianceTechDonate1.png
    threshold: 0.8
    one_shot: false
    max_clicks: 20
    click_interval_sec: 0.03
    timeout_sec: 30

  # --- Dong panel: luon chay du step truoc false ---
  - event_type: sleep
    run_always: true
    duration_sec: 2

  - event_type: click_position
    run_always: true
    offset_x: 0.05
    offset_y: 0.05

  - event_type: sleep
    run_always: true
    duration_sec: 2

  - event_type: click_position
    run_always: true
    offset_x: 0.05
    offset_y: 0.05

  - event_type: sleep
    run_always: true
    duration_sec: 2

  - event_type: click_position
    run_always: true
    offset_x: 0.05
    offset_y: 0.05
