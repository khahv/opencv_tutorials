# Function: DonateAllianceTech
description: "Donate Alliance Tech: Alliance icon -> Techs -> Like -> Donate x20 -> close"

steps:

  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png

  - event_type: base_zoomout
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    roi_center_x: 0.93
    roi_center_y: 0.96
    roi_padding: 2
    threshold: 0.6
    scroll_times: 5
    scroll_interval_sec: 0.1
    
  # Mo Alliance panel
  - event_type: match_click
    template: buttons_template/AllianceIconButton.png
    threshold: 0.7
    one_shot: true
    timeout_sec: 10
    debug_log: true

  - event_type: sleep
    duration_sec: 2

  # Vao tab Alliance Techs
  - event_type: match_click
    template: buttons_template/AllianceTechs.png
    threshold: 0.8
    one_shot: true
    timeout_sec: 10
    debug_log: true

  # Click Like de chon tech can donate
  - event_type: match_click
    template: buttons_template/AllianceTechLike1.png
    threshold: 0.8
    one_shot: true
    timeout_sec: 10
    debug_log: true

  # Donate 20 lan
  - event_type: match_click
    template: buttons_template/AllianceTechDonate1.png
    threshold: 0.8
    match_color: true
    one_shot: false
    max_clicks: 30
    click_interval_sec: 0.03
    timeout_sec: 20
    debug_log: true

  # --- Dong panel: luon chay du step truoc false ---
  - event_type: sleep
    run_always: true
    duration_sec: 2

  - event_type: click_position
    run_always: true
    offset_x: 0.05
    offset_y: 0.05

  - event_type: sleep
    run_always: true
    duration_sec: 2

  - event_type: click_position
    run_always: true
    offset_x: 0.05
    offset_y: 0.05

  - event_type: sleep
    run_always: true
    duration_sec: 2

  - event_type: click_position
    run_always: true
    offset_x: 0.05
    offset_y: 0.05
