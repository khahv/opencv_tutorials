# Function: FightBoomer
description: "Magnifier -> Boomer -> set level (OCR) -> Search -> Team Up -> March"
steps:
  

  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png


  - event_type: match_click
    template: buttons_template/EventCenter.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2

  - event_type: sleep
    duration_sec: 1

  - event_type: match_click
    template: buttons_template/FurylordIcon.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2
    on_success_goto: ReceiveAward

  # Drag all to the left
  - event_type: drag
    direction_x: 1
    direction_y: 0
    count: 1
    run_always: true
    start_x: 0.25
    start_y: 0.96
    drag_distance_ratio: 1.5

  - event_type: sleep
    duration_sec: 1
  
  - event_type: match_click
    template: buttons_template/FurylordIcon.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2
    on_success_goto: ReceiveAward

  # Drag to the right at FuryLordIcon
  - event_type: drag
    direction_x: -1
    direction_y: 0
    count: 1
    run_always: true
    start_x: 0.25
    start_y: 0.96
    drag_distance_ratio: 0.5

  - event_type: sleep
    duration_sec: 1

  - event_type: match_click
    template: buttons_template/FurylordIcon.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2

  - event_type: sleep
    duration_sec: 1

 
  
  - event_type: click_position
    name: ReceiveAward
    x: 0.50
    y: 0.72
    on_success_goto: FurylordGoButtonSleep

  - event_type: sleep
    name: FurylordGoButtonSleep
    duration_sec: 1

  - event_type: match_click
    name: FurylordGoButton
    template: buttons_template/FurylordGoButton.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 5
    
  - event_type: sleep
    duration_sec: 1

  - event_type: match_click
    name: FurylordAttackIcon
    template: buttons_template/FurylordAttackIcon.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 5
    on_fail_goto: ClickMiddleScreen
    on_success_goto: MarchButton

  - event_type: click_position
    name: ClickMiddleScreen
    x: 0.50
    y: 0.50
    on_success_goto: FurylordAttackIcon

  - event_type: match_click
    name: MarchButton
    template: buttons_template/March.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 5

  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    roi_center_x: 0.93
    roi_center_y: 0.96
    roi_padding: 2
    threshold: 0.6
    run_always: true

