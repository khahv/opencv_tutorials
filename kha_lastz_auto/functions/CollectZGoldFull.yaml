# Function: CollectZGoldFull
description: "Collect ZGold when full: zoom out to world map, drag 4 huong, click Zgold/EXP buttons"

steps:
  - event_type: base_zoomout
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    threshold: 0.75
    scroll_times: 5
    debug_log: true
    scroll_interval_sec: 0.1
    debug_save: true

  - event_type: sleep
    duration_sec: 2

  - event_type: match_click
    template_array:
      - buttons_template/EXPRewardNormal.png
      - buttons_template/ZGoldNormal.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 1
    exit_on_true: true

  - event_type: sleep
    duration_sec: 2
    run_always: true

  # Huong keo: x,y trong khoang -1 ~ 1. Cheo tren trai = (-1,-1)
  - event_type: drag
    x: -1
    y: -1
    count: 5
    run_always: true

  - event_type: sleep
    duration_sec: 2
    run_always: true

  - event_type: match_click
    template_array:
      - buttons_template/EXPRewardNormal.png
      - buttons_template/ZGoldNormal.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 1
    exit_on_true: true

  - event_type: drag
    x: 1
    y: 0
    count: 10
    run_always: true

  - event_type: sleep
    duration_sec: 2
    run_always: true

  - event_type: match_click
    template_array:
      - buttons_template/EXPRewardNormal.png
      - buttons_template/ZGoldNormal.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 1
    exit_on_true: true

  - event_type: drag
    x: 0
    y: 1
    count: 7
    run_always: true

  - event_type: sleep
    duration_sec: 2
    run_always: true

  - event_type: match_click
    template_array:
      - buttons_template/EXPRewardNormal.png
      - buttons_template/ZGoldNormal.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 1
    exit_on_true: true

  - event_type: drag
    x: -1
    y: 0
    count: 10
    run_always: true

  - event_type: sleep
    duration_sec: 2
    run_always: true

  - event_type: match_click
    template_array:
      - buttons_template/EXPRewardNormal.png
      - buttons_template/ZGoldNormal.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 1
    exit_on_true: true
