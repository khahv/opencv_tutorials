# Function: CollectZGoldFull
description: "Collect ZGold when full: zoom out to world map then click ZgoldFull button"

steps:

  - event_type: base_zoomout
    template: buttons_template/HeadquartersButton.png
    threshold: 0.75
    scroll_times: 5
    scroll_interval_sec: 0.1

  - event_type: match_click
    template: buttons_template/ZgoldFull.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 10
