# Function: TurnOnShield
# Triggered automatically when an attack is detected (trigger: attacked in config.yaml).
description: "Activate shield when under attack: send Zalo alert, then HQ -> World -> CityWall -> PeaceShield"

steps:

  - event_type: sleep
    duration_sec: 10

  - event_type: match_click
    template: buttons_template/HeadquartersButton.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 3

  - event_type: sleep
    duration_sec: 1

  - event_type: match_click
    template: buttons_template/WorldButton.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 10
    run_always: true

  - event_type: sleep
    duration_sec: 1

  - event_type: click_position
    offset_x: 0.5
    offset_y: 0.5

  - event_type: sleep
    duration_sec: 1

  - event_type: match_click
    template: buttons_template/BuffIcon.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 10

  - event_type: sleep
    duration_sec: 3

  # Đọc vùng timer PeaceShield (vd. "23:32:13"). ocr_regions: x,y,w,h = tỉ lệ màn hình (0.0–1.0).
  # exit_on_true: đọc được text (shield đang bật) → kết thúc function.
  - event_type: ocr_log
    label: "PeaceShield remaining"
    char_whitelist: "0123456789:"
    debug_save: true
    debug_log: true
    exit_on_true: true
    ocr_regions:
      - name: remaining
        x: 0.32
        y: 0.38
        w: 0.46
        h: 0.02
        # x,y,w,h = tỉ lệ màn hình, tự mò và fill

  - event_type: match_click
    template: buttons_template/PeaceShieldActivated.png
    roi_center_x: 0.85
    roi_center_y: 0.38
    roi_padding: 2
    threshold: 0.75
    one_shot: true
    timeout_sec: 10
    click_offset_x: 0.48
    click_offset_y: 0.0

  - event_type: sleep
    duration_sec: 1
    run_always: true   # run even if match_click above failed (shield card not matched)

  # Click 1 trong 3 vị trí shield (8h / 24h / 3 ngày). Chọn loại trong UI: Settings → TurnOnShield → Loại shield.
  - event_type: click_position
    position_setting_key: shield_duration
    default: "8h"
    positions:
      "8h":  [0.75, 0.31]
      "24h": [0.75, 0.40]
      "3d":  [0.75, 0.49]

  # Always close the City Walls panel — runs even if previous steps aborted
  - event_type: click_position
    x: 0.03
    y: 0.08
    run_always: true