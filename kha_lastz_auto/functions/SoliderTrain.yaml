# Function: SoliderTrain
description: "Train soldiers: Headquarters -> collect Shooter -> train all Soldiers -> collect Assault -> train all Soldiers"
run_count: 1

steps:
  # Dong UI popup truoc khi zoom out
  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png

  # Zoom out to world map before navigating
  - event_type: base_zoomout
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    threshold: 0.75
    scroll_times: 5
    scroll_interval_sec: 0.1

  # All subsequent steps run regardless — each UI element may or may not be present
  - event_type: match_click
    template: buttons_template/ShooterCollect.png
    threshold: 0.65
    one_shot: true
    timeout_sec: 2
    run_always: true

  - event_type: sleep
    duration_sec: 1

  - event_type: match_click
    template: buttons_template/AssaultCollect.png
    threshold: 0.65
    one_shot: true
    timeout_sec: 2
    run_always: true
  
  - event_type: sleep
    duration_sec: 1

  - event_type: match_click
    template: buttons_template/RiderCollect.png
    threshold: 0.65
    one_shot: true
    timeout_sec: 2
    run_always: true

  - event_type: sleep
    duration_sec: 1

  - event_type: match_click
    template: buttons_template/SoliderTrain.png
    threshold: 0.6
    timeout_sec: 3
    click_interval_sec: 0.15
    run_always: true
    debug_log: true

  - event_type: sleep
    duration_sec: 3

  - event_type: match_click
    template: buttons_template/SoliderTrainButton.png
    name: SoliderTrainButtonClick
    threshold: 0.85
    timeout_sec: 3
    on_success_goto: SleepBeforeCloseUI
    click_interval_sec: 0.15

  - event_type: match_click
    template: buttons_template/ReplenishAll.png
    threshold: 0.85
    timeout_sec: 3
    click_interval_sec: 0.15
    on_success_goto: ConfirmYellowClick

  - event_type: match_click
    name: ConfirmYellowClick
    template: buttons_template/ConfirmYellow.png
    on_success_goto: SoliderTrainButtonClick
    threshold: 0.85
    timeout_sec: 3
    click_interval_sec: 0.15
  
  - event_type: sleep
    duration_sec: 2
    name: SleepBeforeCloseUI

  - event_type: close_ui
    name: CloseUI
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    roi_center_x: 0.93
    roi_center_y: 0.96
    roi_padding: 2
    threshold: 0.6

  