# Function: CheckMail (ten = ten file)
description: "Mo Mail -> Alliance -> Claim All -> System -> Claim All -> dong popup"
steps:
  - event_type: match_click
    template: buttons_template/Mail.png
    threshold: 0.7
    one_shot: true
    timeout_sec: 5
    debug_log: true
    roi_center_x: 0.93   # ← copy từ YAML ROI: x: 0.07
    roi_center_y: 0.81   # ← copy từ YAML ROI: y: 0.95
    roi_padding: 3.0 
    
  - event_type: sleep
    duration_sec: 1
  - event_type: match_click
    template: buttons_template/AllianceButton.png
    threshold: 0.8
    match_color: true
    one_shot: true
    timeout_sec: 5
    debug_log: true
  - event_type: sleep
    duration_sec: 0.5
  - event_type: match_click
    template: buttons_template/ClaimAll.png
    threshold: 0.8
    match_color: true
    one_shot: true
    debug_log: true
    timeout_sec: 5
  - event_type: sleep
    duration_sec: 0.5
  - event_type: match_click
    template: buttons_template/SystemButton.png
    threshold: 0.8
    match_color: true
    one_shot: true
    timeout_sec: 5
    debug_log: true
  - event_type: sleep
    duration_sec: 0.5
  - event_type: match_click
    template: buttons_template/ClaimAll.png
    threshold: 0.8
    match_color: true
    one_shot: true
    timeout_sec: 5
    debug_log: true
  - event_type: sleep
    duration_sec: 2
  - event_type: click_position
    offset_x: 0.15
    offset_y: 0.15
  - event_type: sleep
    duration_sec: 2
  - event_type: click_position
    offset_x: 0.15
    offset_y: 0.15
