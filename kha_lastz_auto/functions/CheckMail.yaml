# Function: CheckMail (ten = ten file)
description: "Mo Mail -> Alliance -> Claim All -> System -> Claim All -> dong popup"
steps:

  # Dong UI popup: lap click (0.03, 0.08) cho den khi thay HQ hoac World
  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png

  - event_type: match_click
    template: buttons_template/Mail.png
    threshold: 0.7
    one_shot: true
    timeout_sec: 5
    debug_log: true
    roi_center_x: 0.93   # ← copy từ YAML ROI: x: 0.07
    roi_center_y: 0.81   # ← copy từ YAML ROI: y: 0.95
    roi_padding: 3.0 
    
  - event_type: sleep
    duration_sec: 1
  - event_type: match_click
    template: buttons_template/AllianceButton.png
    threshold: 0.8
    one_shot: true
    timeout_sec: 5
    debug_log: true
    roi_center_x: 0.42
    roi_center_y: 0.09
    roi_padding: 2.0
  - event_type: sleep
    duration_sec: 1

  - event_type: match_click
    template: buttons_template/ClaimAll.png
    threshold: 0.8
    one_shot: true
    debug_log: true
    timeout_sec: 5
    
  - event_type: sleep
    duration_sec: 2

  - event_type: click_position
    x: 0.51 
    y: 0.03



  - event_type: match_click
    template: buttons_template/SystemButton.png
    threshold: 0.8
    one_shot: true
    roi_center_x: 0.58
    roi_center_y: 0.08
    roi_padding: 2.0
    timeout_sec: 5
    debug_log: true

  - event_type: sleep
    duration_sec: 1

  - event_type: match_click
    template: buttons_template/ClaimAll.png
    threshold: 0.8
    one_shot: true
    timeout_sec: 5
    debug_log: true

  - event_type: sleep
    duration_sec: 2
  

  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png