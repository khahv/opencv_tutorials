# Function: TestAllianceAttack
# Triggered by alliance_attacked event (AllianceBeingAttackedWarning icon detected).
# Action: send Zalo message (configurable message + repeat interval). Optional sleep for testing.
description: "Alliance attacked: send Zalo alert, repeat every 300s while icon visible"

steps:
  - event_type: send_zalo
    receiver_name: "Nhóm HLSE"
    message: " @All Bớ làng nước ơi!, liên minh đang bị tấn công"
    repeat_interval_sec: 300
  - event_type: sleep
    duration_sec: 3
  
  - event_type: match_click
    template_array:
      - buttons_template/AllianceBeingAttackedWarning1.png
      - buttons_template/AllianceBeingAttackedWarning.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 3
    debug_log: true

  - event_type: sleep
    duration_sec: 2

  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    threshold: 0.75