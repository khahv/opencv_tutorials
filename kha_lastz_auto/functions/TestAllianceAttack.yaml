# Function: TestAllianceAttack
# Triggered by alliance_attacked event (AllianceBeingAttackedWarning icon detected).
# Action: send Zalo message (configurable message + repeat interval). Optional sleep for testing.
description: "Alliance attacked: send Zalo alert, repeat every 300s while icon visible"

steps:
  - event_type: send_zalo
    message: " @All Bớ làng nước ơi!, liên minh đang bị tấn công"
    repeat_interval_sec: 300
  - event_type: sleep
    duration_sec: 3
