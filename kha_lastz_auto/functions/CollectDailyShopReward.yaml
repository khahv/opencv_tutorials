# Function: FightBoomer
description: "Magnifier -> Boomer -> set level (OCR) -> Search -> Team Up -> March"
steps:
  
  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png


  - event_type: match_click
    template: buttons_template/DailyReward5.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2

  - event_type: sleep
    duration_sec: 1
  
  - event_type: match_click
    template: buttons_template/DailyReward10.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2
    roi_center_x: 0.70
    roi_center_y: 0.23
    roi_padding: 2

  - event_type: sleep
    duration_sec: 2
  
  - event_type: click_position
    x: 0.49
    y: 0.18

  - event_type: match_click
    template: buttons_template/DailyRewardClaimButton.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2
    run_always: true


  - event_type: sleep
    duration_sec: 2

  - event_type: click_position
    x: 0.49
    y: 0.18

  - event_type: sleep
    duration_sec: 2

  - event_type: match_click
    template: buttons_template/DailyReward6.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2
    run_always: true
 
  - event_type: sleep
    duration_sec: 3

  - event_type: match_click
    template: buttons_template/DailyReward7.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 2

  - event_type: sleep
    duration_sec: 3
    run_always: true
  
  - event_type: match_click
    template: buttons_template/DailyRewardFree.png
    threshold: 0.9
    one_shot: true
    timeout_sec: 2
    run_always: true

  - event_type: sleep
    duration_sec: 3
    run_always: true

  - event_type: match_click
    template: buttons_template/DailyReward8.png
    threshold: 0.7
    one_shot: true
    timeout_sec: 2
  
  - event_type: sleep
    duration_sec: 1
    run_always: true

  - event_type: match_click
    template: buttons_template/DailyRewardFree.png
    threshold: 0.9
    one_shot: true
    timeout_sec: 2

  - event_type: sleep
    duration_sec: 3
    run_always: true

  - event_type: sleep
    duration_sec: 3
    run_always: true
    
  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png

