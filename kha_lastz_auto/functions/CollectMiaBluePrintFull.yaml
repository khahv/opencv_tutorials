# Function: CollectZGoldFull
description: "Collect ZGold when full: zoom out to world map, drag 4 huong, click Zgold/EXP buttons"

steps:
  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png

  - event_type: base_zoomout
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    threshold: 0.75
    scroll_times: 5
    debug_log: true
    scroll_interval_sec: 0.1
    # debug_save: true
  - event_type: sleep
    duration_sec: 2

  - event_type: match_click
    template_array:
      - buttons_template/CollectMiaBlueprint.png
    threshold: 0.65
    one_shot: true
    timeout_sec: 1
    debug_log: true
    exit_on_true: true

  - event_type: sleep
    duration_sec: 2
    run_always: true

  # One long drag toward top-left (direction -1,-1). Length = drag_distance_ratio * min(width, height).
  - event_type: drag
    direction_x: -1
    direction_y: -1
    count: 1
    drag_distance_ratio: 0.5
    run_always: true

  - event_type: sleep
    duration_sec: 2
    run_always: true

  - event_type: match_click
    template_array:
      - buttons_template/CollectMiaBlueprint.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 1
    exit_on_true: true

  - event_type: drag
    direction_x: 1
    direction_y: 0
    count: 1
    drag_distance_ratio: 0.5
    run_always: true

  - event_type: sleep
    duration_sec: 2
    run_always: true

  - event_type: match_click
    template_array:
      - buttons_template/CollectMiaBlueprint.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 2
    exit_on_true: true

  - event_type: drag
    direction_x: 0
    direction_y: 1
    drag_distance_ratio: 0.5
    count: 1
    run_always: true

  - event_type: sleep
    duration_sec: 2
    run_always: true

  - event_type: match_click
    template_array:
      - buttons_template/CollectMiaBlueprint.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 1
    exit_on_true: true

  - event_type: drag
    direction_x: -1
    direction_y: 0
    drag_distance_ratio: 0.5
    count: 1
    run_always: true

  - event_type: sleep
    duration_sec: 2
    run_always: true

  - event_type: match_click
    template_array:
      - buttons_template/CollectMiaBlueprint.png
    threshold: 0.75
    one_shot: true
    timeout_sec: 1
    exit_on_true: true
    
  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    roi_center_x: 0.93
    roi_center_y: 0.96
    roi_padding: 2
    threshold: 0.6
    run_always: true
