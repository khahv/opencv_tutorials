# Function: CollectKatrinaGasFull
description: "Collect Katrina Gas when full: zoom out to world map then click ZgoldFull button"

steps:

  - event_type: close_ui
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png

  - event_type: base_zoomout
    template: buttons_template/HeadquartersButton.png
    world_button: buttons_template/WorldButton.png
    back_button: buttons_template/BackButton.png
    back_button_threshold: 0.8
    roi_center_x: 0.93
    roi_center_y: 0.96
    roi_padding: 2
    threshold: 0.6
    scroll_times: 5
    scroll_interval_sec: 0.1

  - event_type: match_click
    template: buttons_template/KatrinaFullGas.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 5
  - event_type: sleep
    duration_sec: 3 

  - event_type: match_click
    template: buttons_template/FullGas.png
    threshold: 0.6
    one_shot: true
    timeout_sec: 5
    run_always: true
