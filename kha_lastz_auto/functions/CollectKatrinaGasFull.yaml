# Function: CollectKatrinaGasFull
description: "Collect Katrina Gas when full: zoom out to world map then click ZgoldFull button"

steps:

  - event_type: base_zoomout
    template: buttons_template/HeadquartersButton.png
    min_match_count: 0.6
    scroll_times: 5
    scroll_interval_sec: 0.1

  - event_type: match_click
    template: buttons_template/KatrinaFullGas.png
    min_match_count: 0.6
    one_shot: true
    timeout_sec: 10
