# Kich thuoc client area cua so game luc chup template images.
# Bot se tu dong resize window ve dung kich thuoc nay khi khoi dong
# -> scale = 1.0, khong can normalize, match nhanh nhat co the.
# Neu resize that bai (fullscreen/bi khoa), bot fallback normalize theo scale.
reference_width: 2400
reference_height: 1600

# Function list: key, cron, enabled
# https://crontab.guru/ for cron syntax
# Functions run in FIFO order: whoever triggers first runs first.
# If a function triggers while another is running, it is queued and runs after.
functions:
  - name: PinLoggin
    trigger: logged_out
    enabled: true
    key: l

  - name: TurnOnShield
    trigger: attacked
    key: o
    enabled: true

  - name: FightBoomer
    key: b
    cron: "*/2 * * * *"
    enabled: false

  - name: ClickTreasure
    key: y
    enabled: true

  - name: ClickTreasureManual
    key: t
    enabled: true

  - name: CollectExplorationReward
    cron: "0 */8 * * *"
    enabled: true
    key: c

  - name: SoliderTrain
    cron: "0 */3 * * *"
    enabled: true
    key: s

  - name: HelpAlliance
    cron: "*/2 * * * *"
    enabled: true
    key: h

  - name: CheckMail
    key: m
    cron: "0 */5 * * *"
    enabled: true

  - name: DonateAllianceTech
    key: d
    enabled: true

  - name: TestAllianceAttack
    trigger: alliance_attacked
    enabled: true
    key: a

 