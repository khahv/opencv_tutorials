# Function list: key, cron, priority (lower = higher priority), enabled
# https://crontab.guru/ for cron syntax
functions:
  - name: PinLoggin
    cron: "*/30 * * * *"
    priority: 1
    enabled: true
    key: l

  - name: FightBoomer
    key: b
    priority: 2
    enabled: true

  - name: ClickTreasure
    key: t
    priority: 4
    enabled: true

  - name: CollectExplorationReward
    cron: "0 */8 * * *"
    priority: 98
    enabled: true
    key: c

  - name: SoliderTrain
    cron: "0 */6 * * *"
    priority: 99
    enabled: true
    key: s

  - name: HelpAlliance
    cron: "*/15 * * * *"
    priority: 100
    enabled: true
    key: h

  - name: CheckMail
    key: m
    cron: "0 */5 * * *"
    priority: 50
    enabled: true