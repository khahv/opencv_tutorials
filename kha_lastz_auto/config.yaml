# Kich thuoc client area cua so game luc chup template images.
# Bot se tu dong resize window ve dung kich thuoc nay khi khoi dong
# -> scale = 1.0, khong can normalize, match nhanh nhat co the.
# Neu resize that bai (fullscreen/bi khoa), bot fallback normalize theo scale.
reference_width: 2400
reference_height: 1600

# Function list: key, cron, priority (lower = higher priority), enabled
# https://crontab.guru/ for cron syntax
functions:
  - name: PinLoggin
    cron: "*/30 * * * *"
    priority: 1
    enabled: true
    key: l

  - name: FightBoomer
    key: b
    priority: 2
    enabled: true

  - name: ClickTreasure
    key: t
    priority: 4
    enabled: true

  - name: CollectExplorationReward
    cron: "0 */8 * * *"
    priority: 98
    enabled: true
    key: c

  - name: SoliderTrain
    cron: "0 */6 * * *"
    priority: 99
    enabled: true
    key: s

  - name: HelpAlliance
    cron: "*/15 * * * *"
    priority: 100
    enabled: true
    key: h

  - name: CheckMail
    key: m
    cron: "0 */5 * * *"
    priority: 50
    enabled: true